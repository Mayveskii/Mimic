name: Data Pipeline

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      skip_sync:
        description: 'Skip repo sync step'
        type: boolean
        default: false
      skip_distill:
        description: 'Skip distillation step'
        type: boolean
        default: false
      skip_reach:
        description: 'Skip reach step'
        type: boolean
        default: false

env:
  DISTILL_BATCH_SIZE: 10
  MIMIC_SEED_DIR: data/seeds
  MIMIC_AUTO_RESEARCH_MAX_RESULTS: 5

permissions:
  contents: read

jobs:
  sync-repos:
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_sync != 'true'
    outputs:
      updated: ${{ steps.sync.outputs.updated }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Python deps
        run: |
          sudo apt-get update && sudo apt-get install -y git
          pip install pyyaml requests
      - name: Sync repository list
        id: sync
        run: |
          python3 scripts/sync_repos.py \
            --manifest mimicrya/repos-manifest.yaml \
            --output mimicrya/repos-manifest.yaml
          if git diff --quiet mimicrya/repos-manifest.yaml; then
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "updated=true" >> $GITHUB_OUTPUT
          fi
      - name: Upload manifest
        if: steps.sync.outputs.updated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: manifest
          path: mimicrya/repos-manifest.yaml

  distill:
    needs: sync-repos
    if: (needs.sync-repos.outputs.updated == 'true' || github.event.inputs.skip_sync == 'true') && github.event.inputs.skip_distill != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update && sudo apt-get install -y git gcc make libssl-dev python3-dev
          pip install pyyaml gitpython
      - name: Run distillation
        run: |
          python3 data/extraction/distill_pipeline.py \
            --batch-size ${{ env.DISTILL_BATCH_SIZE }} \
            --output data/distilled/
      - name: Validate quality gates
        run: |
          python3 data/extraction/quality_gate.py \
            --slots data/distilled/mesh_slots.json \
            --min-precision 0.8 \
            --qac all
      - name: Upload distilled data
        uses: actions/upload-artifact@v4
        with:
          name: distilled
          path: data/distilled/

  reach:
    needs: sync-repos
    if: github.event.inputs.skip_reach != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Python deps
        run: pip install requests
      - name: Run reach
        run: |
          python3 scripts/reach.py \
            --manifest mimicrya/repos-manifest.yaml \
            --seeds ${{ env.MIMIC_SEED_DIR }} \
            --max-results ${{ env.MIMIC_AUTO_RESEARCH_MAX_RESULTS }}
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
      - name: Upload seeds
        uses: actions/upload-artifact@v4
        with:
          name: seeds
          path: ${{ env.MIMIC_SEED_DIR }}/

  create-pr:
    needs: [distill, reach]
    if: always() && (needs.distill.result == 'success' || needs.reach.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true
      - name: Apply changes
        run: |
          mkdir -p data/distilled data/seeds
          cp -r artifacts/distilled/* data/distilled/ 2>/dev/null || true
          cp -r artifacts/seeds/* data/seeds/ 2>/dev/null || true
          cp artifacts/repos-manifest.yaml mimicrya/repos-manifest.yaml 2>/dev/null || true
      - name: Create Pull Request
        run: |
          git config user.name "Mimic Bot"
          git config user.email "bot@mayveskii.dev"
          BRANCH="auto/data-sync-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "data: automated sync & distillation $(date -u +%Y-%m-%d)" || exit 0
          git push origin "$BRANCH"
          gh pr create \
            --base dev \
            --head "$BRANCH" \
            --title "data: automated sync & distillation" \
            --body "Automated data pipeline run. Review before merge." \
            --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
