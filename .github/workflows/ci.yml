name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y gcc make

      - name: Build
        run: make build

      - name: Check
        run: make check
