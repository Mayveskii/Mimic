name: CI

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'project_context_main/**'
      - 'cookbook/**'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'project_context_main/**'
      - 'cookbook/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: gofmt -l . | grep -q . && exit 1 || true
      - name: go vet
        run: go vet ./...

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y gcc make libssl-dev
      - name: Build C-core
        run: make core/libcore.a
      - name: Build Go binary
        run: CGO_ENABLED=1 go build -trimpath -o bin/mimic ./cmd/mimic

  test:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y gcc make libssl-dev
      - name: Run tests
        run: make test
      - name: Run C-core tests
        run: make core-test

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
