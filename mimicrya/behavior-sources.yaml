# Behavior Sources — Mimic
#
# Mayveskii/* repositories — sources of behavior for Mimic
# Mimicry: select the best from each implementation → build into Mimic
# Not distillation (git blame → survival), but selection: HOW to implement a function
#
# Schema per source:
#   repo: Mayveskii/<name>
#   sync_status: pending | partial | done
#   behaviors:
#     - name: snake_case identifier
#       what: one-line description of the behavior
#       extracted_from: file paths in the source repo
#       implemented_in: target path in Mimic
#       status: pending | planned | partial | done | reference | future
#   notes: free-form context

sources:
