# Behavior Sources — Mimic

# Mayveskii/* repositories — sources of behavior for Mimic
# Mimicry: select the best from each implementation → build into Mimic
# Not distillation (git blame → survival), but selection: HOW to implement a function

sources:
  - repo: Mayveskii/embryo
    sync_status: partial
    behaviors:
      - name: binary_runtime
        what: BinaryRuntime with OpCodes, tool loop, session, inference pool, hooks
        extracted_from: pkg/do/
        implemented_in: core/
        status: partial (c-core derived from this)

      - name: orchestrator_pipeline
        what: Pipeline: state→mesh→DIRECT→classify→exec→flywheel→respond
        extracted_from: pkg/orchestrator/
        implemented_in: internal/orchestrator/
        status: planned

      - name: mesh_agent_cascade
        what: MeshAgent + Cascade (3-tier: local→medium→top)
        extracted_from: pkg/agent/
        implemented_in: internal/orchestrator/
        status: planned

      - name: hunt_system
        what: Hunt system: assess, compress, github, meshscan (17 files)
        extracted_from: pkg/hunt/
        implemented_in: internal/tool/
        status: planned

      - name: mesh_graph_slots
        what: Mesh graphs, slots, domains
        extracted_from: pkg/mesh/
        implemented_in: core/ (bmap)
        status: partial (libbmap.a derived from this)

      - name: hybrid_rag
        what: 5-signal hybrid RAG + qdrant
        extracted_from: pkg/rag/
        implemented_in: internal/orchestrator/
        status: planned

      - name: projectmap_sqlite
        what: SQLite-based project navigation
        extracted_from: pkg/projectmap/
        implemented_in: internal/orchestrator/
        status: planned

      - name: survival_index
        what: git blame → Survival Index
        extracted_from: pkg/survival/
        implemented_in: core/ (distillation)
        status: planned

      - name: mapstore_slots_invariants
        what: Slot, store, invariant_registry
        extracted_from: pkg/mapstore/
        implemented_in: core/ (bmap)
        status: planned

      - name: mcp_tools_registry
        what: 45+ MCP tools, JSON-RPC, HTTP connection pooling, circuit breaker
        extracted_from: cmd/mcp/
        implemented_in: internal/mcp/ + internal/tool/
        status: planned
    notes: Embryo repo where Mimic was born. Contains Go implementations that inform C-core and internal/ design.

